function useFadeInView() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) { setVisible(true); obs.disconnect(); } },
      { threshold: 0.1 }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function FadeIn({ children, delay = 0, className = "" }) {
  const [ref, visible] = useFadeInView();
  return (
    <div
      ref={ref}
      className={className}
      style={{
        opacity: visible ? 1 : 0,
        transform: visible ? 'translateY(0)' : 'translateY(28px)',
        transition: `opacity 0.7s ease ${delay}s, transform 0.7s ease ${delay}s`,
      }}
    >
      {children}
    </div>
  );
}

              <div className="glass" style={{ borderRadius: 20, padding: 32 }}>
                {sent ? (
                  <div style={{ textAlign: 'center', padding: '40px 0' }}>
                    <div style={{ fontSize: 48, marginBottom: 16 }}>✦</div>
                    <h3 style={{ fontFamily: 'Syne', fontSize: 22, fontWeight: 700, marginBottom: 10 }}>Message sent!</h3>
                    <p style={{ color: 'rgba(226,232,240,0.5)' }}>I'll get back to you within 24 hours.</p>
                  </div>
                ) : (
                  <form onSubmit={handleSubmit} style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                      <div>
                        <label style={{ fontSize: 12, color: 'rgba(226,232,240,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 6 }}>Name</label>
                        <input
                          value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                          placeholder="Alex Rivera" required
                          style={{ width: '100%', padding: '11px 14px', borderRadius: 10, fontSize: 14 }} />
                      </div>
                      <div>
                        <label style={{ fontSize: 12, color: 'rgba(226,232,240,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 6 }}>Email</label>
                        <input
                          type="email" value={form.email} onChange={e => setForm(f => ({ ...f, email: e.target.value }))}
                          placeholder="you@example.com" required
                          style={{ width: '100%', padding: '11px 14px', borderRadius: 10, fontSize: 14 }} />
                      </div>
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'rgba(226,232,240,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 6 }}>Subject</label>
                      <input
                        value={form.subject} onChange={e => setForm(f => ({ ...f, subject: e.target.value }))}
                        placeholder="Project inquiry" required
                        style={{ width: '100%', padding: '11px 14px', borderRadius: 10, fontSize: 14 }} />
                    </div>
                    <div>
                      <label style={{ fontSize: 12, color: 'rgba(226,232,240,0.45)', letterSpacing: '0.08em', textTransform: 'uppercase', display: 'block', marginBottom: 6 }}>Message</label>
                      <textarea
                        value={form.message} onChange={e => setForm(f => ({ ...f, message: e.target.value }))}
                        placeholder="Tell me about your project..." required rows={5}
                        style={{ width: '100%', padding: '11px 14px', borderRadius: 10, fontSize: 14, resize: 'vertical', minHeight: 120 }} />
                    </div>
                    <button type="submit" className="btn-grad pulse-glow"
                      style={{ padding: '13px', borderRadius: 12, fontSize: 15, fontWeight: 600, fontFamily: 'Syne', width: '100%', marginTop: 4 }}>
                      <span>Send Message ✦</span>
                    </button>
                  </form>
                )}
              </div>
            </FadeIn>
          </div>
        </div>
      </section>
    </div>
  );
}

// ─── FOOTER ───────────────────────────────────────────────────────────────────
function Footer({ setPage }) {
  return (
    <footer style={{ borderTop: '1px solid rgba(255,255,255,0.05)', padding: 'clamp(32px, 4vw, 48px) clamp(1rem, 5vw, 3rem)' }}>
      <div style={{ maxWidth: 1100, margin: '0 auto', display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: 20 }}>
        <button onClick={() => { setPage("Home"); window.scrollTo(0,0); }} style={{ background: 'none', border: 'none', cursor: 'pointer' }}>
          <span style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 16 }}>
            <span className="grad-text">AR</span>
            <span style={{ color: 'rgba(226,232,240,0.3)', margin: '0 6px' }}>/</span>
            <span style={{ color: 'rgba(226,232,240,0.5)', fontWeight: 500 }}>dev</span>
          </span>
        </button>
        <p style={{ color: 'rgba(226,232,240,0.25)', fontSize: 13 }}>
          © 2024 Mailapuram Raghavendhar · Built with React + Tailwind
        </p>
        <div style={{ display: 'flex', gap: 24 }}>
          {['GitHub', 'LinkedIn', 'Twitter'].map(s => (
            <a key={s} href="#" style={{ color: 'rgba(226,232,240,0.3)', fontSize: 13, textDecoration: 'none', transition: 'color 0.2s' }}
              onMouseEnter={e => e.target.style.color = '#c084fc'}
              onMouseLeave={e => e.target.style.color = 'rgba(226,232,240,0.3)'}>
              {s}
            </a>
          ))}
        </div>
      </div>
    </footer>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState("Home");

  const pages = {
    Home: <HomePage setPage={setPage} />,
    About: <AboutPage setPage={setPage} />,
    Projects: <ProjectsPage />,
    Resume: <ResumePage />,
    Blog: <BlogPage />,
    Contact: <ContactPage />,
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Navbar page={page} setPage={setPage} />
      <main style={{ flex: 1 }}>
        <div key={page} style={{ animation: 'fadePageIn 0.4s ease' }}>
          {pages[page]}
        </div>
      </main>
      <Footer setPage={setPage} />

      <style>{`
        @keyframes fadePageIn {
          from { opacity: 0; transform: translateY(12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 640px) {
          .hidden-mobile { display: none !important; }
          .show-mobile { display: flex !important; }
          .project-grid { grid-template-columns: 1fr !important; }
        }
        @media (min-width: 641px) {
          .show-mobile { display: none !important; }
        }
      `}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
